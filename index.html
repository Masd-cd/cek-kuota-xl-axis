<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasD VPNStore - Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        
        /* Animasi masuk tetap kita pertahankan biar elegan */
        .fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md space-y-4 mt-4 fade-in-up">
        
        <div class="flex flex-col items-center justify-center mb-8 mt-4">
            <div class="bg-indigo-600/20 p-3 rounded-2xl border border-indigo-500/30 mb-4 shadow-[0_0_15px_rgba(99,102,241,0.3)]">
                <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-blue-400 to-cyan-400 tracking-tight">MasD VPNStore</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium tracking-wide">Premium All-in-One Tools</p>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-bold text-white mb-3">Pilih Layanan</h2>
            <div class="grid grid-cols-1 gap-4">
                
                <a href="sidompul.html" class="block card p-5 rounded-2xl cursor-pointer hover:border-indigo-500/50 hover:shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all group relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex items-center space-x-4 relative z-10">
                        <div class="bg-indigo-500/20 p-3 rounded-xl text-indigo-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg></div>
                        <div>
                            <h3 class="font-bold text-white text-lg group-hover:text-indigo-300 transition-colors">SiDompul XL/AXIS</h3>
                            <p class="text-xs text-slate-400 mt-1">Cek sisa kuota, masa aktif, dan info nomor.</p>
                        </div>
                    </div>
                </a>

                <a href="downloader.html" class="block card p-5 rounded-2xl cursor-pointer hover:border-cyan-500/50 hover:shadow-[0_0_15px_rgba(6,182,212,0.2)] transition-all group relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex items-center space-x-4 relative z-10">
                        <div class="bg-cyan-500/20 p-3 rounded-xl text-cyan-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></div>
                        <div>
                            <h3 class="font-bold text-white text-lg group-hover:text-cyan-300 transition-colors">Sosmed Downloader</h3>
                            <p class="text-xs text-slate-400 mt-1">Download video TikTok, IG, FB tanpa watermark.</p>
                        </div>
                    </div>
                </a>

                <a href="sholat.html" class="block card p-5 rounded-2xl cursor-pointer hover:border-emerald-500/50 hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all group relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex items-center space-x-4 relative z-10">
                        <div class="bg-emerald-500/20 p-3 rounded-xl text-emerald-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></div>
                        <div>
                            <h3 class="font-bold text-white text-lg group-hover:text-emerald-300 transition-colors">Jadwal Sholat</h3>
                            <p class="text-xs text-slate-400 mt-1">Cek jadwal sholat akurat berdasarkan kota.</p>
                        </div>
                    </div>
                </a>

            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-8 pb-4">Built with MasD & API Tools</p>
    </div>

</body>
</html>

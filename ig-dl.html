<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Downloader - MasD VPNStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md space-y-4 mt-4 fade-in-up">
        
        <a href="downloader.html" class="inline-flex items-center space-x-2 text-slate-400 hover:text-white transition-colors mb-4 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span>Kembali ke Pilihan</span>
        </a>

        <div class="card p-5 rounded-2xl space-y-4 shadow-lg shadow-black/20 border-pink-500/30">
            <div class="flex items-center space-x-3 mb-2">
                <div class="bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 p-2 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.88z"/></svg>
                </div>
                <h2 class="font-bold text-xl text-white">Instagram DL</h2>
            </div>
            <p class="text-sm text-slate-400">Tempelkan link Reels, Video, atau Foto Instagram di bawah ini.</p>
            <div class="flex flex-col space-y-3 mt-2">
                <input type="url" id="inputIgUrl" placeholder="Contoh: https://www.instagram.com/p/..." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all">
                <button id="btnIgCek" onclick="downloadIG()" class="bg-gradient-to-r from-yellow-500 via-pink-600 to-purple-600 text-white font-bold py-3 px-6 rounded-lg hover:shadow-[0_0_15px_rgba(236,72,153,0.4)] active:scale-95 transition-all text-center w-full">Cari Postingan</button>
            </div>
        </div>

        <div id="loadingIg" class="hidden text-center text-slate-400 py-4">
            <svg class="animate-spin h-8 w-8 mx-auto text-pink-500 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p>Memproses link Instagram...</p>
        </div>

        <div id="hasilIg" class="hidden space-y-4">
            </div>
        
        <p class="text-center text-slate-600 text-xs mt-8 pb-4">Built with MasD & API Tools</p>
    </div>

    <script>
        const API_KEY = "MasDSukaCoL1";

        async function downloadIG() {
            let inputUrl = document.getElementById('inputIgUrl').value;
            if (!inputUrl) { alert("Masukkan Link Instagram terlebih dahulu!"); return; }

            document.getElementById('loadingIg').classList.remove('hidden');
            document.getElementById('hasilIg').classList.add('hidden');
            document.getElementById('btnIgCek').disabled = true;

            try {
                // Jembatan Vercel untuk Instagram
                const targetUrl = `/api/proxy-ig?apikey=${API_KEY}&url=${encodeURIComponent(inputUrl)}`;
                const response = await fetch(targetUrl);
                
                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

                const json = await response.json();

                if (json.success && json.data && json.data.length > 0) {
                    
                    const hasilDiv = document.getElementById('hasilIg');
                    hasilDiv.innerHTML = ""; // Bersihkan hasil sebelumnya
                    
                    // Karena formatnya array (bisa lebih dari 1 file), kita gunakan perulangan (forEach)
                    json.data.forEach((item, index) => {
                        let isVideo = item.url.includes(".mp4") || item.url.includes("dl=1");
                        let btnText = isVideo ? "🎬 Download" : "📸 Download";
                        
                        hasilDiv.innerHTML += `
                        <div class="card p-4 rounded-2xl shadow-lg shadow-black/20 border-pink-500/20 mb-4 fade-in-up" style="animation-delay: ${index * 0.1}s">
                            <div class="w-full h-48 bg-slate-800 rounded-xl overflow-hidden mb-4">
                                <img src="${item.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover">
                            </div>
                            <a href="${item.url}" target="_blank" class="block w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-3 px-4 rounded-lg text-center transition-colors shadow-md">
                                ${btnText} (File ${index + 1})
                            </a>
                            <p class="text-[11px] text-slate-400 text-center mt-2">💡 Jika terbuka di tab baru, tekan lama lalu "Download / Simpan".</p>
                        </div>
                        `;
                    });

                    hasilDiv.classList.remove('hidden');
                } else {
                    alert("Gagal memproses! Pastikan akun Instagram tidak di-Private (Terkunci).");
                }
            } catch (error) {
                alert("Detail Error:\n" + error.message);
            } finally {
                document.getElementById('loadingIg').classList.add('hidden');
                document.getElementById('btnIgCek').disabled = false;
            }
        }
    </script>
</body>
</html>

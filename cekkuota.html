<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Kuota XL Bypass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .progress-bar-container { width: 100%; background-color: #334155; border-radius: 9999px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md space-y-4 mt-4">
        
        <div class="flex items-center space-x-3 mb-6">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
            <h1 class="text-xl font-bold">Cek Nomor XL & AXIS</h1>
        </div>

        <div class="card p-5 rounded-2xl space-y-4">
            <div>
                <h2 class="font-semibold text-lg">Cek Nomor XL / AXIS</h2>
                <p class="text-sm text-slate-400 mt-1">Masukkan nomor untuk mengecek info paket dan kuota.</p>
            </div>
            <div class="flex flex-col space-y-3">
                <input type="number" id="inputNomor" placeholder="Contoh: 087712345678" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
                <button id="btnCek" onclick="cekKuota()" class="bg-white text-slate-900 font-bold py-3 px-6 rounded-lg hover:bg-slate-200 transition text-center w-full">Cek Nomor</button>
            </div>
        </div>

        <div id="loading" class="hidden text-center text-slate-400 py-4">
            <svg class="animate-spin h-8 w-8 mx-auto text-indigo-500 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>Mengecek data ke server...</p>
        </div>

        <div id="hasilInfo" class="card p-5 rounded-2xl space-y-4 hidden">
            <h3 class="font-bold text-lg border-b border-slate-700 pb-2">Info Pelanggan</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div class="text-slate-400">MSISDN</div><div class="font-semibold text-right" id="valMsisdn">-</div>
                <div class="text-slate-400">Operator</div><div class="font-semibold text-right" id="valOp">-</div>
                <div class="text-slate-400">Status 4G</div><div class="font-semibold text-right" id="val4g">-</div>
                <div class="text-slate-400">Umur Kartu</div><div class="font-semibold text-right" id="valUmur">-</div>
                <div class="text-slate-400">Masa Aktif</div><div class="font-semibold text-right text-green-400" id="valAktif">-</div>
                <div class="text-slate-400">Masa Tenggang</div><div class="font-semibold text-right text-red-400" id="valTenggang">-</div>
                <div class="text-slate-400">Dukcapil</div><div class="font-semibold text-right text-indigo-300" id="valDukcapil">-</div>
                <div class="text-slate-400">VoLTE</div><div class="font-semibold text-right text-xs" id="valVolte">-</div>
            </div>
        </div>

        <div id="hasilKuota" class="card p-5 rounded-2xl space-y-4 hidden">
            <h3 class="font-bold text-lg border-b border-slate-700 pb-2">Paket & Kuota</h3>
            <div id="listKuota" class="space-y-4">
                </div>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-8 pb-4">Built with Dinns API</p>
    </div>

    <script>
        const API_KEY = "MasDSukaCoL1"; // API Key kamu

        async function cekKuota() {
            const inputNomor = document.getElementById('inputNomor').value;
            if (!inputNomor) return alert("Masukkan nomor HP terlebih dahulu!");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('hasilInfo').classList.add('hidden');
            document.getElementById('hasilKuota').classList.add('hidden');
            document.getElementById('btnCek').disabled = true;

            try {
                // Link asli API kamu
                const targetUrl = `https://endpoint-dinns.vercel.app/api/tools/cekxl?apikey=${API_KEY}&number=${inputNomor}`;
                
                // Jembatan Proxy agar tidak diblokir browser (CORS)
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                const result = await response.json();

                // AllOrigins membungkus datanya di dalam "contents", jadi kita bongkar dulu
                const json = JSON.parse(result.contents);

                if (json.success && json.data && json.data.result) {
                    parsingData(json.data.result);
                } else {
                    alert("Gagal mengecek nomor. Pastikan nomor valid atau API sedang gangguan.");
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan jaringan! Coba lagi beberapa saat lagi.");
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btnCek').disabled = false;
            }
        }

        function parsingData(text) {
            const msisdn = text.match(/MSISDN: (.*)/)?.[1] || "-";
            const tipe = text.match(/Tipe Kartu: (.*)/)?.[1] || "-";
            const status4g = text.match(/Status 4G: (.*)/)?.[1] || "-";
            const umur = text.match(/Umur Kartu: (.*)/)?.[1] || "-";
            const aktif = text.match(/Masa Aktif: (.*)/)?.[1] || "-";
            const tenggang = text.match(/Masa Berakhir Tenggang: (.*)/)?.[1] || "-";
            const dukcapil = text.match(/Status Dukcapil: (.*)/)?.[1] || "-";
            const volteDev = text.match(/Status Volte Device: (.*)/)?.[1] || "-";
            const volteArea = text.match(/Status Volte Area: (.*)/)?.[1] || "-";
            const volteSim = text.match(/Status Volte Simcard: (.*)/)?.[1] || "-";

            document.getElementById('valMsisdn').innerText = msisdn;
            document.getElementById('valOp').innerText = tipe;
            document.getElementById('val4g').innerText = status4g;
            document.getElementById('valUmur').innerText = umur;
            document.getElementById('valAktif').innerText = aktif;
            document.getElementById('valTenggang').innerText = tenggang;
            document.getElementById('valDukcapil').innerText = dukcapil;
            document.getElementById('valVolte').innerText = `Device:${volteDev} Area:${volteArea} SIM:${volteSim}`;

            const listKuotaDiv = document.getElementById('listKuota');
            listKuotaDiv.innerHTML = ""; 

            // ===== AWAL PENAMBAHAN FITUR LIMIT =====
            if (text.includes("batas maksimal") || text.includes("⚠️")) {
                // Kalimat manual sesuai permintaanmu
                const limitWarning = "⚠️ Anda telah mencapai batas maksimal pengecekan 5x dalam 3 jam untuk nomor yang sama. Silahkan melakukan pengecekan kembali dalam 3 jam kedepan.";
                
                listKuotaDiv.innerHTML = `
                    <div class="bg-yellow-900/30 border border-yellow-700 p-4 rounded-xl flex items-start space-x-3">
                        <svg class="w-6 h-6 text-yellow-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-sm text-yellow-400 leading-relaxed">${limitWarning}</p>
                    </div>
                `;
            } else {
            // ===== AKHIR PENAMBAHAN FITUR LIMIT =====
            
                const blokKuota = text.split(/🎁 Quota: /).slice(1);

                if(blokKuota.length === 0) {
                    listKuotaDiv.innerHTML = "<p class='text-sm text-slate-400 italic text-center'>Tidak ada paket aktif.</p>";
                }

                blokKuota.forEach(blok => {
                    const parts = blok.split(/🎁 Benefit: /);
                    const headerPart = parts[0];
                    const namaPaket = headerPart.split('\n')[0].trim();
                    const exp = headerPart.match(/Aktif Hingga: (.*)/)?.[1] || "-";

                    let cardHtml = `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm mb-4">
                            <h4 class="font-semibold text-sm mb-2 text-indigo-300">${namaPaket}</h4>
                            <div class="text-xs text-slate-300 bg-slate-900 border border-slate-700 inline-block px-2 py-1 rounded mb-4">
                                ⏳ Exp: ${exp}
                            </div>
                            <div class="space-y-4"> `;

                    if (parts.length > 1) {
                        parts.slice(1).forEach(b => {
                            const benefitName = b.split('\n')[0].trim();
                            const tipeKuota = b.match(/Tipe Kuota: (.*)/)?.[1] || "DATA";
                            const totalKuotaText = b.match(/🎁 Kuota: (.*)/)?.[1] || "0";
                            const sisaKuotaText = b.match(/Sisa Kuota: (.*)/)?.[1] || "0";

                            const angkaTotal = parseFloat(totalKuotaText) || 1;
                            const angkaSisa = parseFloat(sisaKuotaText) || 0;
                            let persen = (angkaSisa / angkaTotal) * 100;
                            if(persen > 100) persen = 100;

                            let warnaBar = "bg-blue-500";
                            if (persen < 20) warnaBar = "bg-red-500";
                            if (tipeKuota === "VOICE") warnaBar = "bg-emerald-500"; 

                            cardHtml += `
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="text-slate-400 truncate pr-2">${benefitName}</span>
                                        <span class="font-bold whitespace-nowrap">${sisaKuotaText} / ${totalKuotaText}</span>
                                    </div>
                                    <div class="progress-bar-container w-full bg-slate-700 rounded-full h-2">
                                        <div class="progress-bar ${warnaBar} h-2 rounded-full" style="width: ${persen}%;"></div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    cardHtml += `
                            </div>
                        </div>
                    `;

                    listKuotaDiv.innerHTML += cardHtml;
                });
            }

            document.getElementById('hasilInfo').classList.remove('hidden');
            document.getElementById('hasilKuota').classList.remove('hidden');
        }
    </script>
</body>
</html>

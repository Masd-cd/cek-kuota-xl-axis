<!DOCTYPE html>
<html lang="id">
<head>
    <!-- ... head kamu sama seperti sebelumnya ... -->
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <!-- ... bagian atas sampai button sama ... -->

    <div id="loadingYt" class="hidden text-center text-slate-400 py-4">
        <!-- loading sama -->
    </div>

    <!-- HASIL BARU (tidak pakai iframe) -->
    <div id="hasilYt" class="card p-4 rounded-2xl hidden shadow-lg shadow-black/20 border-emerald-500/20">
        <div class="text-center space-y-4">
            <div class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 p-3 rounded-lg text-sm font-semibold">
                ✅ Berhasil! Downloader sudah dibuka di tab baru.
            </div>
            <p class="text-emerald-300 text-sm">Pilih MP3 atau MP4 di halaman noTube (lebih cepat & bersih)</p>
            
            <button onclick="document.getElementById('inputYtUrl').focus()" 
                    class="bg-slate-700 hover:bg-slate-600 text-white py-3 px-6 rounded-xl font-medium transition-all">
                Download Video Lain
            </button>
            
            <p class="text-[11px] text-slate-400">💡 Jika ada tab iklan, tekan Back di HP kamu.</p>
        </div>
    </div>
    
    <p class="text-center text-slate-600 text-xs mt-8 pb-4">Built with MasD & noTube Engine</p>
</div>

<script>
    function downloadYT() {
        let inputUrl = document.getElementById('inputYtUrl').value.trim();
        
        if (!inputUrl) { 
            alert("Masukkan Link YouTube yang valid!"); 
            return; 
        }

        // Tampilkan loading
        document.getElementById('loadingYt').classList.remove('hidden');
        document.getElementById('hasilYt').classList.add('hidden');
        document.getElementById('btnYtVideo').disabled = true;
        
        setTimeout(() => {
            // === AUTO CONVERT KE NOTUBE (langsung buka halaman download) ===
            let notubeUrl;
            if (inputUrl.includes('youtu.be/')) {
                const id = inputUrl.split('youtu.be/')[1].split(/[?&]/)[0];
                notubeUrl = `https://notube.lol/watch?v=${id}`;
            } else if (inputUrl.includes('youtube.com')) {
                notubeUrl = inputUrl.replace('youtube.com', 'notube.lol');
            } else {
                notubeUrl = `https://notube.lol/?url=${encodeURIComponent(inputUrl)}`;
            }

            window.open(notubeUrl, '_blank');

            // Sembunyikan loading & tampilkan pesan
            document.getElementById('loadingYt').classList.add('hidden');
            document.getElementById('hasilYt').classList.remove('hidden');
            document.getElementById('btnYtVideo').disabled = false;

        }, 800); 
    }
</script>
</body>
</html>

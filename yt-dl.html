<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Tools - MasD VPNStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; }
    .card { background-color: #1e293b; border: 1px solid #334155; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

  <div class="w-full max-w-md space-y-4 mt-4 fade-in-up">
    <div class="card p-5 rounded-2xl space-y-4 shadow-lg shadow-black/20 border-red-500/30 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/10 rounded-full blur-3xl -mr-10 -mt-10"></div>

      <div class="flex items-center space-x-3 mb-2 relative z-10">
        <div class="bg-red-600 p-2 rounded-lg shadow-[0_0_10px_rgba(239,68,68,0.4)]">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </div>
        <h2 class="font-bold text-xl text-white">YouTube Tools</h2>
      </div>

      <p class="text-sm text-slate-400 relative z-10">Tempelkan link video atau Shorts YouTube di bawah ini.</p>

      <div class="flex flex-col space-y-3 mt-2 relative z-10">
        <input
          type="url"
          id="inputYtUrl"
          placeholder="Contoh: https://youtu.be/..."
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all"
        />
        <button
          id="btnYtAction"
          onclick="processYT()"
          class="bg-gradient-to-r from-red-600 to-red-500 text-white font-bold py-3 px-4 rounded-lg hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95 transition-all text-center w-full"
        >
          Tampilkan Preview
        </button>
      </div>
    </div>

    <div id="hasilYt" class="card p-4 rounded-2xl hidden shadow-lg shadow-black/20 border-red-500/20">
      <div class="space-y-4">
        <div class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 p-2 rounded-lg text-xs font-semibold">
          ✅ Link valid. Preview berhasil dibuat.
        </div>

        <img id="thumbYt" src="" alt="Thumbnail" class="w-full rounded-xl border border-slate-700" />

        <div class="w-full bg-[#111] rounded-xl overflow-hidden border border-slate-700 shadow-inner aspect-video">
          <iframe
            id="playerYt"
            src=""
            class="w-full h-full border-0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <a id="openYoutubeBtn" href="#" target="_blank"
             class="bg-red-600 text-white text-center font-semibold py-3 px-4 rounded-lg">
            Buka di YouTube
          </a>

          <a id="downloadThumbBtn" href="#" download="thumbnail.jpg"
             class="bg-slate-700 text-white text-center font-semibold py-3 px-4 rounded-lg">
            Download Thumbnail
          </a>
        </div>

        <div class="text-xs text-slate-400 leading-relaxed">
          Tool ini memakai player embed resmi dan thumbnail publik. Tidak melakukan ekstraksi file video/audio.
        </div>
      </div>
    </div>
  </div>

  <script>
    function extractYouTubeId(url) {
      try {
        const u = new URL(url);

        if (u.hostname === "youtu.be") {
          return u.pathname.slice(1);
        }

        if (
          u.hostname.includes("youtube.com") ||
          u.hostname.includes("m.youtube.com")
        ) {
          if (u.searchParams.get("v")) {
            return u.searchParams.get("v");
          }

          if (u.pathname.startsWith("/shorts/")) {
            return u.pathname.split("/shorts/")[1].split("/")[0];
          }

          if (u.pathname.startsWith("/embed/")) {
            return u.pathname.split("/embed/")[1].split("/")[0];
          }
        }

        return null;
      } catch {
        return null;
      }
    }

    function processYT() {
      const inputUrl = document.getElementById("inputYtUrl").value.trim();
      if (!inputUrl) {
        alert("Masukkan link YouTube yang valid.");
        return;
      }

      const videoId = extractYouTubeId(inputUrl);
      if (!videoId) {
        alert("Link YouTube tidak bisa dibaca.");
        return;
      }

      const thumb = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
      const embed = `https://www.youtube.com/embed/${videoId}`;
      const watch = `https://www.youtube.com/watch?v=${videoId}`;

      document.getElementById("thumbYt").src = thumb;
      document.getElementById("playerYt").src = embed;
      document.getElementById("openYoutubeBtn").href = watch;
      document.getElementById("downloadThumbBtn").href = thumb;

      document.getElementById("hasilYt").classList.remove("hidden");
    }
  </script>
</body>
</html>

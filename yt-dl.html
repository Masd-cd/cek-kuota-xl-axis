<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - MasD VPNStore</title>
    <meta name="description" content="Download video YouTube dengan mudah - MasD VPNStore">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0b1120;
            --card: #1a2332;
            --card-border: #2a3a4e;
            --muted: #1e2d3d;
            --input-border: #334d65;
            --text: #f8fafc;
            --text-muted: #7a8ba0;
            --red: #dc2626;
            --red-glow: rgba(220, 38, 38, 0.4);
            --emerald: #10b981;
        }
        body { background-color: var(--bg); color: var(--text); }
        .card { background-color: var(--card); border: 1px solid var(--card-border); }
        .input-field {
            background-color: var(--muted);
            border: 1px solid var(--input-border);
            color: var(--text);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 1px var(--red);
        }
        .input-field::placeholder { color: var(--text-muted); }
        .btn-primary {
            background: linear-gradient(to right, var(--red), #b91c1c);
            color: white;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-primary:hover { box-shadow: 0 0 15px var(--red-glow); }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .download-item {
            background-color: var(--muted);
            border: 1px solid var(--input-border);
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        .download-item:hover { border-color: var(--red); }
        .download-item:active { transform: scale(0.98); }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner { animation: spin 1s linear infinite; }
        .success-badge {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md space-y-4 mt-4 fade-in-up">

        <!-- Header Card -->
        <div class="card p-5 rounded-2xl space-y-4 shadow-lg shadow-black/20 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/10 rounded-full blur-3xl -mr-10 -mt-10"></div>

            <div class="flex items-center space-x-3 mb-2 relative z-10">
                <div class="bg-red-600 p-2 rounded-lg" style="box-shadow: 0 0 10px rgba(220,38,38,0.4)">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </div>
                <h1 class="font-bold text-xl text-white">YouTube DL</h1>
            </div>

            <p class="text-sm relative z-10" style="color: var(--text-muted)">Tempelkan link video atau Shorts YouTube di bawah ini.</p>

            <div class="flex flex-col space-y-3 mt-2 relative z-10">
                <input type="url" id="inputUrl" placeholder="Contoh: https://youtu.be/..." class="input-field w-full rounded-lg px-4 py-3">
                <p id="errorMsg" class="text-sm text-red-500 hidden"></p>
                <button id="btnExtract" onclick="handleDownload()" class="btn-primary py-3 px-4 rounded-lg text-center w-full">Mulai Ekstrak File</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingSection" class="hidden text-center py-4" style="color: var(--text-muted)">
            <svg class="spinner h-8 w-8 mx-auto text-red-500 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-2 text-sm">Mencari link download...</p>
        </div>

        <!-- Results -->
        <div id="resultsSection" class="hidden card p-4 rounded-2xl shadow-lg shadow-black/20 fade-in-up space-y-4">
            <img id="thumbnail" src="" alt="" class="w-full rounded-lg hidden">
            <p id="videoTitle" class="text-sm font-semibold text-white hidden"></p>
            <div class="success-badge p-2 rounded-lg text-xs font-semibold text-center">
                ✅ Berhasil! Pilih format di bawah.
            </div>
            <div id="videoLinks" class="space-y-2 hidden">
                <div class="flex items-center gap-2 text-sm font-semibold text-white">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    Video
                </div>
                <div id="videoList"></div>
            </div>
            <div id="audioLinks" class="space-y-2 hidden">
                <div class="flex items-center gap-2 text-sm font-semibold text-white">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    Audio
                </div>
                <div id="audioList"></div>
            </div>
            <p class="text-center text-xs" style="color: var(--text-muted)">💡 Klik link di atas untuk mulai download.</p>
        </div>

        <p class="text-center text-xs mt-8 pb-4" style="color: rgba(122,139,160,0.5)">Built with MasD & Widget v2 Engine</p>
    </div>

    <script>
        // ========== CONFIG ==========
        // Ganti URL di bawah dengan URL Supabase project kamu
        const SUPABASE_URL = 'https://jgldioalafnqcpoayaqd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbGRpb2FsYWZucWNwb2F5YXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTc5NjMsImV4cCI6MjA4OTQ3Mzk2M30.vzzI68QolD0xqIuUXTr8J62xNpmmQbvuzbGQDTfZRGE';

        const $ = (id) => document.getElementById(id);

        function showError(msg) {
            $('errorMsg').textContent = msg;
            $('errorMsg').classList.remove('hidden');
        }

        function hideError() {
            $('errorMsg').classList.add('hidden');
        }

        function createDownloadItem(link) {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'download-item flex items-center justify-between rounded-lg px-4 py-2.5 block mb-2';
            a.innerHTML = `
                <span class="text-sm">${link.quality}${link.extension ? ' (.' + link.extension + ')' : ''}</span>
                <div class="flex items-center gap-2" style="color: var(--text-muted)">
                    ${link.size ? '<span class="text-xs">' + link.size + '</span>' : ''}
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </div>
            `;
            return a;
        }

        function parseResponse(data) {
            const video = [];
            const audio = [];
            let title = data?.title || '';
            let thumbnail = '';

            if (data?.source === 'primary') {
                title = data?.title || '';
                thumbnail = (data?.thumbnails && data.thumbnails[0]?.url) || '';
                const videos = data?.videos?.items || [];
                for (const v of videos) {
                    if (v?.url) {
                        video.push({ url: v.url, quality: v.quality || v.qualityLabel || 'Unknown', extension: v.extension || 'mp4', size: v.sizeText || '' });
                    }
                }
                const audios = data?.audios?.items || [];
                for (const a of audios) {
                    if (a?.url) {
                        audio.push({ url: a.url, quality: a.quality || a.bitrate || 'Audio', extension: a.extension || 'm4a', size: a.sizeText || '' });
                    }
                }
            } else {
                title = data?.title || '';
                thumbnail = data?.thumbnail || '';
                const links = data?.links || data?.medias || [];
                if (Array.isArray(links)) {
                    for (const l of links) {
                        if (l?.url) {
                            const isAudio = l.format?.includes('audio') || l.extension === 'mp3' || l.extension === 'm4a';
                            (isAudio ? audio : video).push({
                                url: l.url, quality: l.quality || l.format || 'Unknown',
                                extension: l.extension || (isAudio ? 'm4a' : 'mp4'), size: l.formattedSize || l.size || ''
                            });
                        }
                    }
                }
                if (video.length === 0 && audio.length === 0) {
                    const formats = data?.formats || data?.adaptiveFormats || [];
                    if (Array.isArray(formats)) {
                        for (const f of formats) {
                            if (f?.url) {
                                const isAudio = f.mimeType?.includes('audio');
                                (isAudio ? audio : video).push({
                                    url: f.url, quality: f.qualityLabel || f.quality || 'Unknown',
                                    extension: isAudio ? 'm4a' : 'mp4', size: f.contentLength || ''
                                });
                            }
                        }
                    }
                }
            }
            return { title, thumbnail, video, audio };
        }

        async function handleDownload() {
            const url = $('inputUrl').value.trim();
            if (!url) { showError('Masukkan Link YouTube yang valid!'); return; }

            hideError();
            $('btnExtract').disabled = true;
            $('btnExtract').textContent = 'Mengekstrak...';
            $('loadingSection').classList.remove('hidden');
            $('resultsSection').classList.add('hidden');

            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/youtube-download`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({ videoUrl: url })
                });

                const data = await res.json();

                if (data?.error) {
                    showError(data.error);
                    return;
                }

                const parsed = parseResponse(data);

                if (parsed.video.length === 0 && parsed.audio.length === 0) {
                    showError('Tidak ditemukan link download. Coba link video lain.');
                    console.log('API response:', JSON.stringify(data, null, 2));
                    return;
                }

                // Show thumbnail
                if (parsed.thumbnail) {
                    $('thumbnail').src = parsed.thumbnail;
                    $('thumbnail').alt = parsed.title;
                    $('thumbnail').classList.remove('hidden');
                } else {
                    $('thumbnail').classList.add('hidden');
                }

                // Show title
                if (parsed.title) {
                    $('videoTitle').textContent = parsed.title;
                    $('videoTitle').classList.remove('hidden');
                } else {
                    $('videoTitle').classList.add('hidden');
                }

                // Video links
                $('videoList').innerHTML = '';
                if (parsed.video.length > 0) {
                    $('videoLinks').classList.remove('hidden');
                    parsed.video.slice(0, 6).forEach(link => {
                        $('videoList').appendChild(createDownloadItem(link));
                    });
                } else {
                    $('videoLinks').classList.add('hidden');
                }

                // Audio links
                $('audioList').innerHTML = '';
                if (parsed.audio.length > 0) {
                    $('audioLinks').classList.remove('hidden');
                    parsed.audio.slice(0, 4).forEach(link => {
                        $('audioList').appendChild(createDownloadItem(link));
                    });
                } else {
                    $('audioLinks').classList.add('hidden');
                }

                $('resultsSection').classList.remove('hidden');

            } catch (e) {
                showError('Terjadi kesalahan. Coba lagi nanti.');
                console.error(e);
            } finally {
                $('loadingSection').classList.add('hidden');
                $('btnExtract').disabled = false;
                $('btnExtract').textContent = 'Mulai Ekstrak File';
            }
        }

        // Enter key support
        $('inputUrl').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - MasD VPNStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md space-y-4 mt-4 fade-in-up">
        
        <a href="downloader.html" class="inline-flex items-center space-x-2 text-slate-400 hover:text-white transition-colors mb-4 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span>Kembali ke Pilihan</span>
        </a>

        <div class="card p-5 rounded-2xl space-y-4 shadow-lg shadow-black/20 border-red-500/30 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            
            <div class="flex items-center space-x-3 mb-2 relative z-10">
                <div class="bg-red-600 p-2 rounded-lg shadow-[0_0_10px_rgba(239,68,68,0.4)]">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </div>
                <h2 class="font-bold text-xl text-white">YouTube DL</h2>
            </div>
            <p class="text-sm text-slate-400 relative z-10">Tempelkan link video atau Shorts YouTube di bawah ini.</p>
            <div class="flex flex-col space-y-3 mt-2 relative z-10">
                <input type="url" id="inputYtUrl" placeholder="Contoh: https://youtu.be/..." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all">
                
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnYtVideo" onclick="downloadYT(false)" class="bg-gradient-to-r from-red-600 to-red-500 text-white font-bold py-3 px-4 rounded-lg hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95 transition-all text-center text-sm">Cari Video</button>
                    <button id="btnYtAudio" onclick="downloadYT(true)" class="bg-slate-700 text-slate-200 border border-slate-600 font-bold py-3 px-4 rounded-lg hover:bg-slate-600 active:scale-95 transition-all text-center text-sm">Cari Audio MP3</button>
                </div>
            </div>
        </div>

        <div id="loadingYt" class="hidden text-center text-slate-400 py-4">
            <svg class="animate-spin h-8 w-8 mx-auto text-red-500 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p id="loadingText">Menghubungkan ke Server...</p>
        </div>

        <div id="hasilYt" class="card p-4 rounded-2xl hidden shadow-lg shadow-black/20 border-red-500/20">
            <div class="w-full h-48 bg-slate-800 rounded-xl overflow-hidden mb-4 relative">
                <img id="ytThumb" src="" alt="Thumbnail" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div>
                <div class="absolute bottom-3 left-3 right-3 text-white font-bold text-sm" id="ytTitle">Judul Video YouTube</div>
            </div>
            
            <div class="text-center space-y-3">
                <a id="btnDownloadAkhir" href="#" target="_blank" class="block w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-4 rounded-xl text-center transition-colors shadow-lg shadow-red-500/30 text-[15px] uppercase tracking-wider">
                    ⬇️ Download Sekarang
                </a>
                <p class="text-[11px] text-slate-400 mt-2">💡 Tips: Jika terbuka di tab baru pemutar video/lagu, klik titik tiga (⋮) lalu pilih Download.</p>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-xs mt-8 pb-4">Built with MasD & Local APIs</p>
    </div>

    <script>
        async function downloadYT(isAudio) {
            let inputUrl = document.getElementById('inputYtUrl').value;
            if (!inputUrl || !inputUrl.includes('youtu')) { 
                alert("Masukkan Link YouTube yang valid!"); 
                return; 
            }

            document.getElementById('loadingYt').classList.remove('hidden');
            document.getElementById('hasilYt').classList.add('hidden');
            document.getElementById('btnYtVideo').disabled = true;
            document.getElementById('btnYtAudio').disabled = true;
            
            document.getElementById('loadingText').innerText = "Menembus server YouTube...";

            try {
                let finalUrl = "";
                let title = "Video YouTube";
                let thumb = "https://cdn-icons-png.flaticon.com/512/1384/1384060.png"; // Gambar default
                
                const type1 = isAudio ? "ytmp3" : "ytmp4";

                // --- MESIN 1: API RYZENDESU ---
                try {
                    const res1 = await fetch(`https://api.ryzendesu.vip/api/downloader/${type1}?url=${encodeURIComponent(inputUrl)}`);
                    if (res1.ok) {
                        const json1 = await res1.json();
                        // Cari link dengan mode detektif
                        finalUrl = json1.url || json1.download || (json1.data && json1.data.url) || (json1.result && json1.result.url);
                        title = json1.title || (json1.data && json1.data.title) || title;
                        thumb = json1.thumbnail || json1.thumb || (json1.data && json1.data.thumbnail) || thumb;
                    }
                } catch (e) {
                    console.log("Mesin 1 Sibuk, beralih ke Mesin 2...");
                }

                // --- MESIN 2: API SIPUTZX (Aktif jika Mesin 1 gagal) ---
                if (!finalUrl) {
                    const res2 = await fetch(`https://api.siputzx.my.id/api/d/${type1}?url=${encodeURIComponent(inputUrl)}`);
                    if (res2.ok) {
                        const json2 = await res2.json();
                        finalUrl = (json2.data && json2.data.dl) || (json2.data && json2.data.url) || json2.url || json2.download || "";
                        title = (json2.data && json2.data.title) || json2.title || title;
                        thumb = (json2.data && json2.data.thumbnail) || json2.thumbnail || thumb;
                    }
                }

                // --- TAMPILKAN HASIL ---
                if (finalUrl) {
                    document.getElementById('ytTitle').innerText = title;
                    document.getElementById('ytThumb').src = thumb;
                    
                    const btn = document.getElementById('btnDownloadAkhir');
                    btn.href = finalUrl;
                    btn.innerHTML = isAudio ? "🎵 DOWNLOAD MP3 SEKARANG" : "📽️ DOWNLOAD MP4 SEKARANG";

                    document.getElementById('hasilYt').classList.remove('hidden');
                } else {
                    alert("Maaf, API sedang dalam perbaikan atau format video ini diproteksi ketat oleh YouTube.");
                }

            } catch (error) {
                alert("Terjadi kendala jaringan. Pastikan koneksi internet stabil.");
            } finally {
                document.getElementById('loadingYt').classList.add('hidden');
                document.getElementById('btnYtVideo').disabled = false;
                document.getElementById('btnYtAudio').disabled = false;
            }
        }
    </script>
</body>
</html>
